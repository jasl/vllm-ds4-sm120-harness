<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京时区 · 高级时钟</title>
    <style>
        /* ----- 全局重置 & 布局 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #edf0f5;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            user-select: none;
        }

        /* ----- 时钟容器：提供深色边框 & 3D阴影 ----- */
        .clock-wrapper {
            display: inline-block;
            padding: 14px;
            background: #ffffff;
            border-radius: 50%;
            border: 3px solid #1e2a3a;
            box-shadow:
                0 2px 8px rgba(0, 0, 0, 0.06),
                0 8px 28px rgba(0, 0, 0, 0.10),
                0 20px 50px rgba(0, 0, 0, 0.08),
                inset 0 -2px 6px rgba(0, 0, 0, 0.03);
            transition: box-shadow 0.2s ease;
        }

        .clock-wrapper:hover {
            box-shadow:
                0 2px 8px rgba(0, 0, 0, 0.06),
                0 10px 34px rgba(0, 0, 0, 0.12),
                0 26px 60px rgba(0, 0, 0, 0.10),
                inset 0 -2px 6px rgba(0, 0, 0, 0.03);
        }

        /* ----- Canvas：圆形表盘 ----- */
        #clockCanvas {
            display: block;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #ffffff;
            cursor: default;
            /* 确保 canvas 与容器背景融合 */
            -webkit-tap-highlight-color: transparent;
        }

        /* ----- 适配小屏幕 ----- */
        @media (max-width: 480px) {
            .clock-wrapper {
                padding: 10px;
                border-width: 2px;
            }
            #clockCanvas {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="clock-wrapper">
        <canvas id="clockCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  1. Canvas 初始化
            // ============================================================
            const canvas = document.getElementById('clockCanvas');
            const ctx = canvas.getContext('2d');

            // 尺寸常量（画布 400×400）
            const W = 400;
            const H = 400;
            const CX = 200; // 中心 X
            const CY = 200; // 中心 Y
            const RADIUS = 192; // 表盘半径

            // ============================================================
            //  2. 获取北京时间（精确到毫秒）
            // ============================================================
            function getBeijingTime() {
                const now = new Date();
                // 本地时间与 UTC 的偏移（分钟）
                const localOffset = now.getTimezoneOffset();
                // 北京时区 UTC+8，偏移为 -480 分钟（与 UTC 的差异）
                const beijingOffset = -480;
                // 差值（分钟）
                const diff = beijingOffset - localOffset;
                return new Date(now.getTime() + diff * 60 * 1000);
            }

            // ============================================================
            //  3. 绘制核心函数
            // ============================================================

            /**
             * 绘制表盘背景、刻度、数字、日期时间、指针、中心装饰
             */
            function updateClock() {
                // ----- 3a. 获取当前北京时间 -----
                const now = getBeijingTime();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();
                const millis = now.getMilliseconds();

                // 用于角度计算的平滑值
                const smoothSec = seconds + millis / 1000;
                const smoothMin = minutes + smoothSec / 60;
                const smoothHour = (hours % 12) + smoothMin / 60;

                // ----- 3b. 角度计算（从12点顺时针） -----
                const hourAngle = smoothHour * 30; // 每小时 30°
                const minAngle = smoothMin * 6; // 每分钟 6°
                const secAngle = smoothSec * 6; // 每秒 6°

                // ----- 3c. 清空画布 -----
                ctx.clearRect(0, 0, W, H);

                // ==========================================================
                //  3d. 表盘背景（白色圆形）
                // ==========================================================
                ctx.save();
                ctx.beginPath();
                ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.restore();

                // ==========================================================
                //  3e. 绘制 60 个刻度
                // ==========================================================
                ctx.save();
                for (let i = 0; i < 60; i++) {
                    const angle = (i * 6 - 90) * Math.PI / 180;
                    const isMajor = (i % 5 === 0);

                    // 整点刻度：更长、更粗、更深
                    const outerR = isMajor ? 186 : 186;
                    const innerR = isMajor ? 156 : 173;
                    const lineWidth = isMajor ? 2.8 : 1.2;
                    const color = isMajor ? '#1e2a3a' : '#b5bfcc';

                    ctx.beginPath();
                    ctx.moveTo(CX + innerR * Math.cos(angle), CY + innerR * Math.sin(angle));
                    ctx.lineTo(CX + outerR * Math.cos(angle), CY + outerR * Math.sin(angle));
                    ctx.strokeStyle = color;
                    ctx.lineWidth = lineWidth;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
                ctx.restore();

                // ==========================================================
                //  3f. 绘制数字 1-12
                // ==========================================================
                ctx.save();
                const numberRadius = 142;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '600 17px "Arial", "Helvetica Neue", sans-serif';
                ctx.fillStyle = '#1e2a3a';
                for (let i = 1; i <= 12; i++) {
                    const angle = (i * 30 - 90) * Math.PI / 180;
                    const x = CX + numberRadius * Math.cos(angle);
                    const y = CY + numberRadius * Math.sin(angle);
                    ctx.fillText(i.toString(), x, y);
                }
                ctx.restore();

                // ==========================================================
                //  3g. 绘制日期 & 时间文字（在表盘内部中心偏下）
                // ==========================================================
                ctx.save();

                // -- 日期文字 --
                const year = now.getFullYear();
                const month = now.getMonth() + 1;
                const day = now.getDate();
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                const weekday = weekdays[now.getDay()];
                const dateStr = year + '年' + month + '月' + day + '日　周' + weekday;

                // -- 时间文字 (24小时制，补零) --
                const hh = String(hours).padStart(2, '0');
                const mm = String(minutes).padStart(2, '0');
                const ss = String(seconds).padStart(2, '0');
                const timeStr = hh + ':' + mm + ':' + ss;

                // ---- 文字位置 ----
                const textCenterX = CX;
                const timeY = 268; // 时间 Y
                const dateY = 290; // 日期 Y

                // ---- 绘制时间（较大，加粗） ----
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '700 18px "Arial", "Helvetica Neue", sans-serif';
                ctx.fillStyle = '#1e2a3a';
                // 加一点微弱的文字阴影提升可读性
                ctx.shadowColor = 'rgba(255,255,255,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(timeStr, textCenterX, timeY);
                ctx.shadowBlur = 0;

                // ---- 绘制日期（较小，浅色） ----
                ctx.font = '500 13px "Arial", "Helvetica Neue", sans-serif';
                ctx.fillStyle = '#6a7a8d';
                ctx.fillText(dateStr, textCenterX, dateY);

                ctx.restore();

                // ==========================================================
                //  3h. 绘制指针（时针 → 分针 → 秒针）
                // ==========================================================

                // ---- 辅助函数：绘制单根指针 ----
                function drawHand(length, width, color, angleDeg, tailLength) {
                    const angleRad = (angleDeg - 90) * Math.PI / 180;
                    ctx.save();
                    ctx.translate(CX, CY);
                    ctx.rotate(angleRad);
                    ctx.beginPath();
                    // 主体从 tail 延伸到 length
                    const tail = tailLength || 0;
                    ctx.moveTo(-tail, 0);
                    ctx.lineTo(length, 0);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    ctx.restore();
                }

                // ---- 时针 ----
                ctx.save();
                const hourLength = 102;
                const hourWidth = 5.2;
                const hourColor = '#1a2230';
                // 时针尾部稍短
                drawHand(hourLength, hourWidth, hourColor, hourAngle, 14);
                ctx.restore();

                // ---- 分针 ----
                ctx.save();
                const minLength = 138;
                const minWidth = 3.2;
                const minColor = '#2c3e50';
                drawHand(minLength, minWidth, minColor, minAngle, 20);
                ctx.restore();

                // ---- 秒针（平滑 + 红色 + 尾部平衡锤） ----
                ctx.save();
                const secLength = 160;
                const secWidth = 1.6;
                const secColor = '#d64045';

                // 秒针主体
                const secAngleRad = (secAngle - 90) * Math.PI / 180;
                ctx.translate(CX, CY);
                ctx.rotate(secAngleRad);
                ctx.beginPath();
                ctx.moveTo(-22, 0);
                ctx.lineTo(secLength, 0);
                ctx.strokeStyle = secColor;
                ctx.lineWidth = secWidth;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 秒针尾部小圆点（平衡锤）
                ctx.beginPath();
                ctx.arc(-24, 0, 3.2, 0, Math.PI * 2);
                ctx.fillStyle = secColor;
                ctx.fill();

                // 秒针头部小圆（增加精致感）
                ctx.beginPath();
                ctx.arc(secLength - 2, 0, 2.6, 0, Math.PI * 2);
                ctx.fillStyle = secColor;
                ctx.fill();

                ctx.restore();

                // ==========================================================
                //  3i. 中心装饰圆点（多层，增加高级感）
                // ==========================================================
                ctx.save();

                // 外圈（深色）
                ctx.beginPath();
                ctx.arc(CX, CY, 7.5, 0, Math.PI * 2);
                ctx.fillStyle = '#1e2a3a';
                ctx.shadowColor = 'rgba(0,0,0,0.12)';
                ctx.shadowBlur = 6;
                ctx.fill();
                ctx.shadowBlur = 0;

                // 内圈（白色高光）
                ctx.beginPath();
                ctx.arc(CX, CY, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                // 最内极小点（增加层次）
                ctx.beginPath();
                ctx.arc(CX, CY, 1.2, 0, Math.PI * 2);
                ctx.fillStyle = '#1e2a3a';
                ctx.fill();

                ctx.restore();

                // ==========================================================
                //  3j. 表盘外圈精致细环（装饰）
                // ==========================================================
                ctx.save();
                ctx.beginPath();
                ctx.arc(CX, CY, RADIUS - 1.8, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(30,42,58,0.12)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
                ctx.restore();

                // ---- 下一帧 ----
                requestAnimationFrame(updateClock);
            }

            // ============================================================
            //  4. 启动时钟
            // ============================================================
            // 首次立即绘制，然后由 requestAnimationFrame 驱动
            requestAnimationFrame(updateClock);

        })();
    </script>

</body>
</html>
