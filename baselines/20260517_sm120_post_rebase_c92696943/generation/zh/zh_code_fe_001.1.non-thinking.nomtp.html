<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>轻量看板 · 任务管理</title>
  <style>
    /* 全局重置与字体 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f4f6fa;
      color: #1e293b;
      padding: 1.5rem 1.2rem;
      min-height: 100vh;
    }
    /* 看板容器 */
    .app-container {
      max-width: 1300px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    h1 small {
      font-size: 0.9rem;
      font-weight: 400;
      color: #475569;
    }
    /* 工具栏 : 搜索 + 筛选 + 新增按钮 */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem 1rem;
      align-items: center;
      background: white;
      padding: 0.8rem 1.2rem;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      margin-bottom: 1.8rem;
      border: 1px solid #e9edf2;
    }
    .toolbar .search-box {
      flex: 2 1 200px;
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }
    .toolbar .search-box input {
      width: 100%;
      padding: 0.5rem 0.8rem;
      border: 1px solid #d1d9e6;
      border-radius: 40px;
      font-size: 0.95rem;
      background: #f9fafc;
      transition: 0.2s;
    }
    .toolbar .search-box input:focus {
      border-color: #3b82f6;
      outline: none;
      background: white;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .filter-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-group label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
    }
    .filter-group select {
      padding: 0.4rem 0.6rem;
      border-radius: 30px;
      border: 1px solid #d1d9e6;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn {
      background: #eef2f6;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: #1e293b;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
      box-shadow: 0 2px 4px rgba(59,130,246,0.2);
    }
    .btn-primary:hover {
      background: #2563eb;
      transform: scale(1.02);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
    }
    .btn-outline:hover {
      background: #e9edf2;
    }
    .btn-sm {
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
    }
    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem 0.25rem;
      border-radius: 30px;
      line-height: 1;
      color: #475569;
      transition: 0.1s;
    }
    .btn-icon:hover {
      background: #e9edf2;
      color: #0f172a;
    }
    /* 三列看板 (grid) */
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }
    .column {
      background: #eef2f6;
      border-radius: 28px;
      padding: 1rem 0.8rem 0.8rem;
      box-shadow: 0 6px 12px rgba(0,0,0,0.02);
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      min-height: 240px;
    }
    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      padding: 0 0.2rem 0.4rem 0.2rem;
      border-bottom: 2px solid #d1d9e6;
    }
    .column-header h2 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .column-header .count-badge {
      background: #cbd5e1;
      color: #1e293b;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.1rem 0.65rem;
      border-radius: 30px;
    }
    .task-list {
      flex: 1;
      min-height: 120px;
      padding: 0.2rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    /* 卡片设计 */
    .task-card {
      background: white;
      padding: 0.8rem 0.9rem 0.7rem;
      border-radius: 18px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.02);
      border: 1px solid #e2e8f0;
      transition: 0.1s;
      cursor: default;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .task-card:hover {
      border-color: #b9c7da;
      box-shadow: 0 6px 12px rgba(0,0,0,0.03);
    }
    .task-card.dragging {
      opacity: 0.5;
      border-style: dashed;
    }
    .task-title {
      font-weight: 600;
      font-size: 1rem;
      word-break: break-word;
      padding-right: 1.2rem;
    }
    .task-desc {
      font-size: 0.85rem;
      color: #475569;
      word-break: break-word;
      margin: 0.1rem 0 0.2rem;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 0.3rem;
      border-top: 1px solid #f0f2f5;
      padding-top: 0.4rem;
    }
    .priority-tag {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.65rem;
      letter-spacing: 0.02em;
      background: #e9edf2;
    }
    .priority-low { background: #e0f2fe; color: #0369a1; }
    .priority-middle { background: #fef9c3; color: #854d0e; }
    .priority-high { background: #fee2e2; color: #991b1b; }
    .card-actions {
      display: flex;
      gap: 0.2rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .card-actions .btn-icon {
      font-size: 0.9rem;
    }
    .move-group {
      display: inline-flex;
      gap: 0.1rem;
      margin-right: 0.2rem;
    }
    /* 新增/编辑模态框 (极简) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.35);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .modal-box {
      background: white;
      max-width: 420px;
      width: 90%;
      padding: 1.5rem 1.8rem;
      border-radius: 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal-box h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .modal-box label {
      font-weight: 500;
      font-size: 0.9rem;
      margin-bottom: 0.1rem;
      color: #1e293b;
    }
    .modal-box input, .modal-box textarea, .modal-box select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #d1d9e6;
      border-radius: 20px;
      font-size: 0.95rem;
      background: #fafcff;
    }
    .modal-box textarea {
      min-height: 60px;
      resize: vertical;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }
    /* 响应式: 窄屏纵向 */
    @media (max-width: 720px) {
      .board {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .filter-group {
        justify-content: flex-start;
      }
    }
    /* 拖拽占位风格 */
    .drag-over {
      background: #e2e8f0;
      border-radius: 24px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="app-container">
  <h1>📋 轻量看板 <small>· 拖拽或按钮移动</small></h1>
  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜索标题或备注…" aria-label="关键词搜索">
    </div>
    <div class="filter-group">
      <label for="priorityFilter">优先级</label>
      <select id="priorityFilter">
        <option value="all">全部</option>
        <option value="低">低</option>
        <option value="中">中</option>
        <option value="高">高</option>
      </select>
    </div>
    <button class="btn btn-primary" id="addTaskBtn">＋ 新增任务</button>
  </div>

  <!-- 三列看板 -->
  <div class="board" id="boardContainer">
    <!-- 待办列 -->
    <div class="column" data-status="todo">
      <div class="column-header"><h2>📝 待办 <span class="count-badge" id="todoCount">0</span></h2></div>
      <div class="task-list" id="todoList" data-status="todo"></div>
    </div>
    <!-- 进行中 -->
    <div class="column" data-status="inprogress">
      <div class="column-header"><h2>⚡ 进行中 <span class="count-badge" id="inprogressCount">0</span></h2></div>
      <div class="task-list" id="inprogressList" data-status="inprogress"></div>
    </div>
    <!-- 已完成 -->
    <div class="column" data-status="done">
      <div class="column-header"><h2>✅ 已完成 <span class="count-badge" id="doneCount">0</span></h2></div>
      <div class="task-list" id="doneList" data-status="done"></div>
    </div>
  </div>
</div>

<!-- 模态框 (新增/编辑共用) -->
<div id="modalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal-box">
    <h3 id="modalTitle">📌 新任务</h3>
    <div>
      <label for="taskTitleInput">标题 *</label>
      <input type="text" id="taskTitleInput" placeholder="必填" maxlength="60">
    </div>
    <div>
      <label for="taskDescInput">备注</label>
      <textarea id="taskDescInput" placeholder="可选" rows="2"></textarea>
    </div>
    <div>
      <label for="taskPriorityInput">优先级</label>
      <select id="taskPriorityInput">
        <option value="低">低</option>
        <option value="中" selected>中</option>
        <option value="高">高</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modalCancelBtn">取消</button>
      <button class="btn btn-primary" id="modalConfirmBtn">保存</button>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- 存储键名 ----------
    const STORAGE_KEY = 'lightKanban_tasks';

    // ---------- 全局状态 ----------
    let tasks = [];               // { id, title, desc, priority, status, createTime }
    let editingId = null;        // 编辑时使用，null 表示新增

    // DOM 元素
    const board = document.getElementById('boardContainer');
    const todoList = document.getElementById('todoList');
    const inprogressList = document.getElementById('inprogressList');
    const doneList = document.getElementById('doneList');
    const todoCount = document.getElementById('todoCount');
    const inprogressCount = document.getElementById('inprogressCount');
    const doneCount = document.getElementById('doneCount');

    const searchInput = document.getElementById('searchInput');
    const priorityFilter = document.getElementById('priorityFilter');
    const addBtn = document.getElementById('addTaskBtn');

    // 模态框
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const taskTitleInput = document.getElementById('taskTitleInput');
    const taskDescInput = document.getElementById('taskDescInput');
    const taskPriorityInput = document.getElementById('taskPriorityInput');
    const modalConfirmBtn = document.getElementById('modalConfirmBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');

    // ---------- 数据持久化 ----------
    function loadTasks() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          tasks = JSON.parse(stored);
        } else {
          tasks = [];
        }
      } catch (e) {
        tasks = [];
      }
      // 确保每个任务有 status 和 createTime；兼容旧数据
      tasks = tasks.map(t => ({
        ...t,
        status: t.status || 'todo',
        createTime: t.createTime || Date.now(),
      }));
    }
    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    // ---------- 辅助函数 ----------
    function getStatusList(status) {
      if (status === 'todo') return todoList;
      if (status === 'inprogress') return inprogressList;
      return doneList;
    }
    function getStatusFromList(list) {
      if (list === todoList) return 'todo';
      if (list === inprogressList) return 'inprogress';
      return 'done';
    }

    // 格式化时间
    function formatTime(ts) {
      const d = new Date(ts);
      return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    // 过滤任务（搜索 + 优先级）
    function filterTasks() {
      const keyword = searchInput.value.trim().toLowerCase();
      const priorityVal = priorityFilter.value;
      return tasks.filter(t => {
        if (priorityVal !== 'all' && t.priority !== priorityVal) return false;
        if (keyword) {
          const inTitle = t.title.toLowerCase().includes(keyword);
          const inDesc = (t.desc || '').toLowerCase().includes(keyword);
          if (!inTitle && !inDesc) return false;
        }
        return true;
      });
    }

    // 渲染看板
    function renderBoard() {
      const filtered = filterTasks();
      // 按 status 分组
      const todoTasks = filtered.filter(t => t.status === 'todo');
      const inprogressTasks = filtered.filter(t => t.status === 'inprogress');
      const doneTasks = filtered.filter(t => t.status === 'done');

      // 更新计数
      const allTodo = tasks.filter(t => t.status === 'todo').length;
      const allInprogress = tasks.filter(t => t.status === 'inprogress').length;
      const allDone = tasks.filter(t => t.status === 'done').length;
      todoCount.textContent = allTodo;
      inprogressCount.textContent = allInprogress;
      doneCount.textContent = allDone;

      renderList(todoList, todoTasks);
      renderList(inprogressList, inprogressTasks);
      renderList(doneList, doneTasks);
    }

    // 渲染单个列表（cards）
    function renderList(listElement, taskArray) {
      listElement.innerHTML = '';
      taskArray.forEach(task => {
        const card = createCardElement(task);
        listElement.appendChild(card);
      });
      // 如果没有任务，可以保留空状态（不用额外提示）
    }

    // 创建卡片 DOM
    function createCardElement(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.draggable = true;
      card.dataset.id = task.id;
      // 拖拽事件
      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragend', handleDragEnd);

      // 标题
      const titleDiv = document.createElement('div');
      titleDiv.className = 'task-title';
      titleDiv.textContent = task.title;

      // 备注
      let descDiv = null;
      if (task.desc && task.desc.trim()) {
        descDiv = document.createElement('div');
        descDiv.className = 'task-desc';
        descDiv.textContent = task.desc.length > 80 ? task.desc.slice(0, 80)+'…' : task.desc;
      }

      // 元信息行：优先级 + 时间 + 操作
      const metaDiv = document.createElement('div');
      metaDiv.className = 'task-meta';

      // 左: 优先级标签 + 创建时间
      const leftSpan = document.createElement('span');
      const prioSpan = document.createElement('span');
      prioSpan.className = `priority-tag priority-${task.priority === '低' ? 'low' : (task.priority === '中' ? 'middle' : 'high')}`;
      prioSpan.textContent = task.priority;
      const timeSpan = document.createElement('span');
      timeSpan.style.marginLeft = '0.4rem';
      timeSpan.textContent = formatTime(task.createTime);
      leftSpan.appendChild(prioSpan);
      leftSpan.appendChild(timeSpan);

      // 右: 操作按钮组
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'card-actions';

      // 移动按钮 (左移/右移) —— 无障碍
      const moveGroup = document.createElement('span');
      moveGroup.className = 'move-group';
      const status = task.status;
      const leftBtn = document.createElement('button');
      leftBtn.className = 'btn-icon';
      leftBtn.innerHTML = '◀';
      leftBtn.setAttribute('aria-label', '向左移动');
      leftBtn.disabled = (status === 'todo');
      leftBtn.addEventListener('click', (e) => { e.stopPropagation(); moveTask(task.id, -1); });
      const rightBtn = document.createElement('button');
      rightBtn.className = 'btn-icon';
      rightBtn.innerHTML = '▶';
      rightBtn.setAttribute('aria-label', '向右移动');
      rightBtn.disabled = (status === 'done');
      rightBtn.addEventListener('click', (e) => { e.stopPropagation(); moveTask(task.id, 1); });
      moveGroup.appendChild(leftBtn);
      moveGroup.appendChild(rightBtn);

      // 编辑按钮
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-icon';
      editBtn.innerHTML = '✎';
      editBtn.setAttribute('aria-label', '编辑任务');
      editBtn.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(task.id); });

      // 删除按钮
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon';
      delBtn.innerHTML = '🗑';
      delBtn.setAttribute('aria-label', '删除任务');
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(task.id); });

      actionsDiv.appendChild(moveGroup);
      actionsDiv.appendChild(editBtn);
      actionsDiv.appendChild(delBtn);

      metaDiv.appendChild(leftSpan);
      metaDiv.appendChild(actionsDiv);

      card.appendChild(titleDiv);
      if (descDiv) card.appendChild(descDiv);
      card.appendChild(metaDiv);

      // 拖拽相关：防止点击误触
      return card;
    }

    // ---------- 任务移动 (按钮方式) ----------
    function moveTask(id, direction) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const statusOrder = ['todo', 'inprogress', 'done'];
      let idx = statusOrder.indexOf(task.status);
      let newIdx = idx + direction;
      if (newIdx < 0 || newIdx > 2) return;
      task.status = statusOrder[newIdx];
      saveTasks();
      renderBoard();
    }

    // ---------- 删除任务 ----------
    function deleteTask(id) {
      if (!confirm('确定要删除此任务吗？')) return;
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderBoard();
    }

    // ---------- 新增/编辑模态框 ----------
    function openNewModal() {
      editingId = null;
      modalTitle.textContent = '📌 新任务';
      taskTitleInput.value = '';
      taskDescInput.value = '';
      taskPriorityInput.value = '中';
      modalOverlay.classList.remove('hidden');
      taskTitleInput.focus();
    }

    function openEditModal(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      editingId = id;
      modalTitle.textContent = '✏️ 编辑任务';
      taskTitleInput.value = task.title;
      taskDescInput.value = task.desc || '';
      taskPriorityInput.value = task.priority;
      modalOverlay.classList.remove('hidden');
      taskTitleInput.focus();
    }

    function closeModal() {
      modalOverlay.classList.add('hidden');
      editingId = null;
    }

    function handleModalConfirm() {
      const title = taskTitleInput.value.trim();
      if (!title) {
        alert('标题不能为空');
        taskTitleInput.focus();
        return;
      }
      const desc = taskDescInput.value.trim();
      const priority = taskPriorityInput.value;

      if (editingId) {
        // 编辑模式
        const task = tasks.find(t => t.id === editingId);
        if (task) {
          task.title = title;
          task.desc = desc;
          task.priority = priority;
        }
      } else {
        // 新增
        const newTask = {
          id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          title: title,
          desc: desc,
          priority: priority,
          status: 'todo',
          createTime: Date.now(),
        };
        tasks.push(newTask);
      }
      saveTasks();
      closeModal();
      renderBoard();
    }

    // ---------- 拖拽逻辑 ----------
    let dragSourceId = null;

    function handleDragStart(e) {
      const card = e.target.closest('.task-card');
      if (!card) return;
      dragSourceId = card.dataset.id;
      e.dataTransfer.setData('text/plain', dragSourceId);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
      const card = e.target.closest('.task-card');
      if (card) card.classList.remove('dragging');
      // 清除所有 drag-over
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      dragSourceId = null;
    }

    // 拖拽目标: 列容器 (task-list)
    document.querySelectorAll('.task-list').forEach(list => {
      list.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        list.classList.add('drag-over');
      });
      list.addEventListener('dragleave', () => {
        list.classList.remove('drag-over');
      });
      list.addEventListener('drop', (e) => {
        e.preventDefault();
        list.classList.remove('drag-over');
        const targetList = e.currentTarget;
        const targetStatus = targetList.dataset.status;
        const sourceId = e.dataTransfer.getData('text/plain');
        if (!sourceId) return;
        const task = tasks.find(t => t.id === sourceId);
        if (!task) return;
        // 如果状态相同，不操作
        if (task.status === targetStatus) return;
        task.status = targetStatus;
        saveTasks();
        renderBoard();
      });
    });

    // ---------- 事件绑定 ----------
    searchInput.addEventListener('input', renderBoard);
    priorityFilter.addEventListener('change', renderBoard);
    addBtn.addEventListener('click', openNewModal);
    modalCancelBtn.addEventListener('click', closeModal);
    modalConfirmBtn.addEventListener('click', handleModalConfirm);
    // 点击overlay背景关闭
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    // 键盘支持: Escape关闭
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !modalOverlay.classList.contains('hidden')) {
        closeModal();
      }
    });

    // 初始化
    loadTasks();
    renderBoard();
  })();
</script>
</body>
</html>
