<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量看板</title>
    <style>
        /* ===== 全局重置与基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #1d1d1f;
            padding: 20px;
            min-height: 100vh;
        }
        /* ===== 布局容器 ===== */
        .app {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* ===== 头部 ===== */
        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 600;
            white-space: nowrap;
        }
        .app-header h1 span {
            color: #4a90d9;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .toolbar input[type="text"],
        .toolbar select {
            padding: 8px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            outline: none;
            transition: border 0.2s;
        }
        .toolbar input[type="text"]:focus,
        .toolbar select:focus {
            border-color: #4a90d9;
        }
        .toolbar input[type="text"] {
            width: 180px;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #4a90d9;
            color: #fff;
        }
        .btn-primary:hover {
            background: #3a7bc8;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #d43a2a;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #d1d5db;
            color: #555;
        }
        .btn-outline:hover {
            background: #f5f5f5;
        }
        .btn-ghost {
            background: transparent;
            color: #555;
        }
        .btn-ghost:hover {
            background: #f0f0f0;
        }
        /* ===== 看板列 ===== */
        .board {
            display: flex;
            gap: 16px;
            min-height: 60vh;
        }
        .column {
            flex: 1;
            background: #f7f8fa;
            border-radius: 12px;
            padding: 12px;
            min-width: 0;
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
        }
        .column.drag-over {
            background: #e8f0fe;
            outline: 2px dashed #4a90d9;
        }
        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 6px 12px 6px;
            font-weight: 600;
            font-size: 15px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.06);
            margin-bottom: 10px;
        }
        .column-header .count {
            background: #e0e3e8;
            border-radius: 20px;
            padding: 0 10px;
            font-size: 12px;
            line-height: 22px;
            font-weight: 500;
            color: #555;
        }
        .column.todo .column-header {
            color: #4a90d9;
        }
        .column.inprogress .column-header {
            color: #e67e22;
        }
        .column.done .column-header {
            color: #27ae60;
        }
        .card-list {
            flex: 1;
            min-height: 80px;
            padding-bottom: 4px;
        }
        /* ===== 任务卡片 ===== */
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 14px 14px 10px 14px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            cursor: grab;
            transition: box-shadow 0.2s, transform 0.1s;
            position: relative;
            border-left: 4px solid #ddd;
        }
        .card:active {
            cursor: grabbing;
        }
        .card:hover {
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
        }
        .card.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
        }
        .card.priority-low {
            border-left-color: #4caf50;
        }
        .card.priority-medium {
            border-left-color: #ff9800;
        }
        .card.priority-high {
            border-left-color: #f44336;
        }
        .card-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .card-note {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            gap: 4px;
        }
        .card-meta .priority-tag {
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            color: #fff;
        }
        .priority-tag.low {
            background: #4caf50;
        }
        .priority-tag.medium {
            background: #ff9800;
        }
        .priority-tag.high {
            background: #f44336;
        }
        .card-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #f0f0f0;
        }
        .card-actions .btn {
            font-size: 12px;
            padding: 3px 8px;
        }
        .move-group {
            display: flex;
            gap: 2px;
            margin-left: auto;
        }
        /* ===== 空状态 ===== */
        .empty-tip {
            text-align: center;
            color: #bbb;
            font-size: 13px;
            padding: 30px 10px;
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            margin-top: 10px;
        }
        /* ===== 模态框 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px 30px 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal h2 {
            font-size: 20px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .modal .field {
            margin-bottom: 14px;
        }
        .modal .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #444;
        }
        .modal .field input,
        .modal .field textarea,
        .modal .field select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }
        .modal .field input:focus,
        .modal .field textarea:focus,
        .modal .field select:focus {
            border-color: #4a90d9;
        }
        .modal .field textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal .field .required {
            color: #e74c3c;
        }
        .modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 18px;
        }
        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
            }
            .app-header h1 {
                text-align: center;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar input[type="text"] {
                width: 100%;
            }
            .board {
                flex-direction: column;
                gap: 14px;
            }
            .column {
                min-height: auto;
            }
            .card-list {
                min-height: 60px;
            }
            .modal {
                padding: 20px;
            }
        }
        @media (max-width: 480px) {
            .card-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .card-actions {
                flex-wrap: wrap;
            }
            .move-group {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ===== 头部 ===== -->
        <header class="app-header">
            <h1>📋 <span>轻量看板</span></h1>
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="🔍 搜索任务..." aria-label="搜索任务">
                <select id="filterPriority" aria-label="筛选优先级">
                    <option value="all">全部优先级</option>
                    <option value="high">高</option>
                    <option value="medium">中</option>
                    <option value="low">低</option>
                </select>
                <button class="btn btn-primary" id="addTaskBtn">＋ 新增任务</button>
            </div>
        </header>

        <!-- ===== 看板 ===== -->
        <div class="board" id="board">
            <!-- 待办 -->
            <div class="column todo" data-status="todo">
                <div class="column-header">
                    <span>📌 待办</span>
                    <span class="count" id="count-todo">0</span>
                </div>
                <div class="card-list" id="list-todo" data-status="todo"></div>
            </div>
            <!-- 进行中 -->
            <div class="column inprogress" data-status="inprogress">
                <div class="column-header">
                    <span>⚡ 进行中</span>
                    <span class="count" id="count-inprogress">0</span>
                </div>
                <div class="card-list" id="list-inprogress" data-status="inprogress"></div>
            </div>
            <!-- 已完成 -->
            <div class="column done" data-status="done">
                <div class="column-header">
                    <span>✅ 已完成</span>
                    <span class="count" id="count-done">0</span>
                </div>
                <div class="card-list" id="list-done" data-status="done"></div>
            </div>
        </div>
    </div>

    <!-- ===== 模态框（新增/编辑） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">新增任务</h2>
            <form id="taskForm" autocomplete="off">
                <div class="field">
                    <label>标题 <span class="required">*</span></label>
                    <input type="text" id="formTitle" placeholder="请输入任务标题" required>
                </div>
                <div class="field">
                    <label>备注</label>
                    <textarea id="formNote" placeholder="可选备注" rows="2"></textarea>
                </div>
                <div class="field">
                    <label>优先级</label>
                    <select id="formPriority">
                        <option value="low">低</option>
                        <option value="medium" selected>中</option>
                        <option value="high">高</option>
                    </select>
                </div>
                <input type="hidden" id="formId" value="">
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="modalCancel">取消</button>
                    <button type="submit" class="btn btn-primary" id="modalSave">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================================ -->
    <script>
        // ================================================================
        //  数据层
        // ================================================================
        const STORAGE_KEY = 'kanban_tasks';

        /** 获取所有任务 */
        function getTasks() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        }

        /** 保存任务列表 */
        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        /** 生成唯一ID */
        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        }

        /** 创建新任务对象 */
        function createTask(title, note, priority, status) {
            const now = new Date().toISOString();
            return {
                id: genId(),
                title: title.trim(),
                note: note.trim(),
                priority: priority || 'medium',
                status: status || 'todo',
                createdAt: now,
                updatedAt: now
            };
        }

        // ================================================================
        //  状态 & 搜索筛选
        // ================================================================
        let currentFilter = {
            keyword: '',
            priority: 'all'
        };

        /** 根据搜索和筛选条件过滤任务 */
        function filterTasks(tasks) {
            const kw = currentFilter.keyword.trim().toLowerCase();
            const pri = currentFilter.priority;
            return tasks.filter(t => {
                // 关键词匹配标题或备注
                if (kw && !t.title.toLowerCase().includes(kw) && !t.note.toLowerCase().includes(kw)) {
                    return false;
                }
                // 优先级筛选
                if (pri !== 'all' && t.priority !== pri) {
                    return false;
                }
                return true;
            });
        }

        // ================================================================
        //  渲染引擎
        // ================================================================
        const statusList = ['todo', 'inprogress', 'done'];
        const statusLabels = { todo: '待办', inprogress: '进行中', done: '已完成' };
        const priorityLabels = { low: '低', medium: '中', high: '高' };
        const priorityClasses = { low: 'low', medium: 'medium', high: 'high' };

        /** 格式化时间显示 */
        function formatTime(iso) {
            const d = new Date(iso);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        /** 渲染单个卡片 HTML */
        function renderCard(task) {
            const priCls = priorityClasses[task.priority] || 'medium';
            const priLabel = priorityLabels[task.priority] || '中';
            const createdAt = formatTime(task.createdAt);
            // 备注预览：纯文本，最多40字符
            const notePreview = task.note ? (task.note.length > 40 ? task.note.slice(0, 40) + '…' : task.note) : '';
            return `
            <div class="card priority-${priCls}" draggable="true" data-id="${task.id}">
              <div class="card-title">${escHtml(task.title)}</div>
              ${notePreview ? `<div class="card-note">${escHtml(notePreview)}</div>` : ''}
              <div class="card-meta">
                <span class="priority-tag ${priCls}">${priLabel}</span>
                <span>${createdAt}</span>
              </div>
              <div class="card-actions">
                <button class="btn btn-ghost btn-sm" data-action="edit" data-id="${task.id}" title="编辑">✎ 编辑</button>
                <button class="btn btn-danger btn-sm" data-action="delete" data-id="${task.id}" title="删除">✕ 删除</button>
                <span class="move-group">
                  <button class="btn btn-outline btn-sm" data-action="move-left" data-id="${task.id}" title="左移">◀</button>
                  <button class="btn btn-outline btn-sm" data-action="move-right" data-id="${task.id}" title="右移">▶</button>
                </span>
              </div>
            </div>
          `;
        }

        /** 简单的HTML转义 */
        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        /** 渲染整个看板 */
        function renderBoard() {
            const allTasks = getTasks();
            const filtered = filterTasks(allTasks);

            // 按状态分组
            const groups = {};
            statusList.forEach(s => groups[s] = []);
            filtered.forEach(t => {
                if (groups[t.status]) groups[t.status].push(t);
            });

            // 渲染每列
            statusList.forEach(status => {
                const listEl = document.getElementById(`list-${status}`);
                const countEl = document.getElementById(`count-${status}`);
                const tasks = groups[status] || [];
                countEl.textContent = tasks.length;
                if (tasks.length === 0) {
                    listEl.innerHTML = `<div class="empty-tip">暂无任务</div>`;
                    return;
                }
                listEl.innerHTML = tasks.map(t => renderCard(t)).join('');
            });

            // 重新绑定每列内部的卡片事件（事件委托在列上处理）
            // 同时让卡片可拖拽 — 已在 renderCard 中设置 draggable
        }

        // ================================================================
        //  事件绑定（利用委托）
        // ================================================================

        /** 处理卡片操作：编辑、删除、移动 */
        function handleCardAction(e) {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const action = btn.dataset.action;
            const id = btn.dataset.id;
            if (!id) return;

            e.stopPropagation();

            if (action === 'edit') {
                openEditModal(id);
            } else if (action === 'delete') {
                deleteTask(id);
            } else if (action === 'move-left') {
                moveTask(id, -1);
            } else if (action === 'move-right') {
                moveTask(id, 1);
            }
        }

        /** 删除任务 */
        function deleteTask(id) {
            if (!confirm('确定要删除这个任务吗？')) return;
            let tasks = getTasks();
            tasks = tasks.filter(t => t.id !== id);
            saveTasks(tasks);
            renderBoard();
        }

        /** 移动任务（方向：-1左移，+1右移） */
        function moveTask(id, direction) {
            const tasks = getTasks();
            const idx = tasks.findIndex(t => t.id === id);
            if (idx === -1) return;
            const task = tasks[idx];
            const curIdx = statusList.indexOf(task.status);
            const newIdx = curIdx + direction;
            if (newIdx < 0 || newIdx >= statusList.length) return;
            task.status = statusList[newIdx];
            task.updatedAt = new Date().toISOString();
            saveTasks(tasks);
            renderBoard();
        }

        // ================================================================
        //  模态框：新增 / 编辑
        // ================================================================
        const overlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const formId = document.getElementById('formId');
        const formTitle = document.getElementById('formTitle');
        const formNote = document.getElementById('formNote');
        const formPriority = document.getElementById('formPriority');
        const taskForm = document.getElementById('taskForm');
        const cancelBtn = document.getElementById('modalCancel');

        /** 打开新增模态框 */
        function openAddModal() {
            modalTitle.textContent = '新增任务';
            formId.value = '';
            taskForm.reset();
            formPriority.value = 'medium';
            overlay.classList.add('active');
            setTimeout(() => formTitle.focus(), 100);
        }

        /** 打开编辑模态框 */
        function openEditModal(id) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            modalTitle.textContent = '编辑任务';
            formId.value = task.id;
            formTitle.value = task.title;
            formNote.value = task.note || '';
            formPriority.value = task.priority || 'medium';
            overlay.classList.add('active');
            setTimeout(() => formTitle.focus(), 100);
        }

        /** 关闭模态框 */
        function closeModal() {
            overlay.classList.remove('active');
            taskForm.reset();
            formId.value = '';
        }

        /** 提交表单（新增或编辑） */
        function handleFormSubmit(e) {
            e.preventDefault();
            const title = formTitle.value.trim();
            if (!title) {
                alert('标题不能为空');
                formTitle.focus();
                return;
            }
            const note = formNote.value.trim();
            const priority = formPriority.value;
            const editId = formId.value;

            let tasks = getTasks();
            if (editId) {
                // 编辑
                const idx = tasks.findIndex(t => t.id === editId);
                if (idx === -1) return;
                tasks[idx].title = title;
                tasks[idx].note = note;
                tasks[idx].priority = priority;
                tasks[idx].updatedAt = new Date().toISOString();
            } else {
                // 新增
                const newTask = createTask(title, note, priority, 'todo');
                tasks.push(newTask);
            }
            saveTasks(tasks);
            closeModal();
            renderBoard();
        }

        // ================================================================
        //  拖拽功能 (HTML5 Drag & Drop)
        // ================================================================
        let draggedId = null;

        /** 卡片拖拽开始 */
        function onDragStart(e) {
            const card = e.target.closest('.card');
            if (!card) return;
            draggedId = card.dataset.id;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedId);
        }

        /** 卡片拖拽结束 */
        function onDragEnd(e) {
            const card = e.target.closest('.card');
            if (card) card.classList.remove('dragging');
            // 移除所有列的高亮
            document.querySelectorAll('.column').forEach(col => col.classList.remove('drag-over'));
            draggedId = null;
        }

        /** 列：拖拽进入 */
        function onDragEnter(e) {
            const col = e.target.closest('.column');
            if (col) col.classList.add('drag-over');
        }

        /** 列：拖拽离开 */
        function onDragLeave(e) {
            const col = e.target.closest('.column');
            if (col && !col.contains(e.relatedTarget)) {
                col.classList.remove('drag-over');
            }
        }

        /** 列：拖拽悬停（必须阻止默认） */
        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        /** 列：放置 */
        function onDrop(e) {
            e.preventDefault();
            const col = e.target.closest('.column');
            if (!col) return;
            col.classList.remove('drag-over');
            const targetStatus = col.dataset.status;
            if (!targetStatus || !draggedId) return;

            const tasks = getTasks();
            const idx = tasks.findIndex(t => t.id === draggedId);
            if (idx === -1) return;
            const task = tasks[idx];
            // 仅当状态变化时才更新
            if (task.status !== targetStatus) {
                task.status = targetStatus;
                task.updatedAt = new Date().toISOString();
                saveTasks(tasks);
                renderBoard();
            }
            draggedId = null;
        }

        // ================================================================
        //  搜索 & 筛选
        // ================================================================
        function handleSearch(e) {
            currentFilter.keyword = e.target.value;
            renderBoard();
        }

        function handleFilterChange(e) {
            currentFilter.priority = e.target.value;
            renderBoard();
        }

        // ================================================================
        //  初始化 & 事件注册
        // ================================================================

        document.addEventListener('DOMContentLoaded', function() {
            // --- 初始渲染 ---
            renderBoard();

            // --- 模态框事件 ---
            document.getElementById('addTaskBtn').addEventListener('click', openAddModal);
            cancelBtn.addEventListener('click', closeModal);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeModal();
            });
            taskForm.addEventListener('submit', handleFormSubmit);

            // --- 卡片操作委托（监听 board） ---
            const board = document.getElementById('board');
            board.addEventListener('click', handleCardAction);

            // --- 拖拽事件 ---
            // 卡片拖拽（使用全局委托）
            document.addEventListener('dragstart', onDragStart);
            document.addEventListener('dragend', onDragEnd);

            // 列放置区域
            document.querySelectorAll('.column').forEach(col => {
                col.addEventListener('dragenter', onDragEnter);
                col.addEventListener('dragleave', onDragLeave);
                col.addEventListener('dragover', onDragOver);
                col.addEventListener('drop', onDrop);
            });

            // --- 搜索 & 筛选 ---
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('filterPriority').addEventListener('change', handleFilterChange);
        });

        // 当 localStorage 在其他标签页发生变化时同步刷新（可选增强）
        window.addEventListener('storage', function(e) {
            if (e.key === STORAGE_KEY) {
                renderBoard();
            }
        });

        // ================================================================
        //  小提示：首次使用如果没有数据，添加一个示例任务方便体验
        // ================================================================
        (function ensureDemoData() {
            const tasks = getTasks();
            if (tasks.length === 0) {
                const demo = [
                    createTask('设计原型图', '完成首页和详情页的交互设计', 'high', 'todo'),
                    createTask('编写API文档', '描述接口参数与返回值', 'medium', 'inprogress'),
                    createTask('修复登录bug', '用户反馈token过期问题', 'low', 'done'),
                ];
                saveTasks(demo);
            }
        })();

        console.log('📋 轻量看板已加载 — 数据保存在 localStorage');
    </script>
</body>
</html>
