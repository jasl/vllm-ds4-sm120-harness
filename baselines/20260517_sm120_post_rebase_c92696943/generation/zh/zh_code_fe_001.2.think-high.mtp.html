<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量看板</title>
    <style>
        /*
         * ========== 基础重置与全局样式 ==========
         */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #1d1d1f;
            padding: 20px;
            min-height: 100vh;
        }

        /* ========== 应用容器 ========== */
        .app {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ========== 头部 ========== */
        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 18px 24px;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
            gap: 12px;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #1d1d1f;
        }

        .app-header h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #8e8e93;
            margin-left: 8px;
        }

        /* ========== 工具栏 ========== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .toolbar input[type="text"],
        .toolbar select {
            padding: 8px 14px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            font-size: 14px;
            background: #f8f9fa;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .toolbar input[type="text"]:focus,
        .toolbar select:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
            background: #fff;
        }

        .toolbar input[type="text"] {
            width: 180px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #007aff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0062cc;
        }

        .btn-secondary {
            background: #e5e5ea;
            color: #1d1d1f;
        }

        .btn-secondary:hover {
            background: #d1d1d6;
        }

        .btn-danger {
            background: #ff3b30;
            color: #fff;
        }

        .btn-danger:hover {
            background: #d63031;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        .btn-icon {
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: background 0.2s;
            line-height: 1;
        }

        .btn-icon:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .btn-icon:focus-visible {
            outline: 2px solid #007aff;
            outline-offset: 2px;
        }

        /* ========== 看板三列 ========== */
        .board {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .column {
            flex: 1;
            min-width: 0;
            background: #f8f9fc;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #e8ecf0;
            transition: background 0.2s;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8ecf0;
            font-weight: 600;
            font-size: 16px;
        }

        .column-header .count {
            background: #e8ecf0;
            padding: 0 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #555;
        }

        /* 各列专属色调 */
        .column-todo .column-header {
            color: #007aff;
            border-bottom-color: #007aff;
        }
        .column-doing .column-header {
            color: #ff9500;
            border-bottom-color: #ff9500;
        }
        .column-done .column-header {
            color: #34c759;
            border-bottom-color: #34c759;
        }

        .column-todo {
            background: #f0f6ff;
        }
        .column-doing {
            background: #fff8f0;
        }
        .column-done {
            background: #f0faf3;
        }

        /* ========== 卡片列表（拖拽容器） ========== */
        .card-list {
            min-height: 120px;
            padding: 4px 0;
            transition: background 0.2s;
            border-radius: 8px;
        }

        .card-list.drag-over {
            background: rgba(0, 122, 255, 0.08);
            outline: 2px dashed #007aff;
            outline-offset: -4px;
        }

        /* ========== 任务卡片 ========== */
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8ecf0;
            transition: box-shadow 0.2s, transform 0.15s;
            cursor: default;
            position: relative;
        }

        .card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .card.dragging {
            opacity: 0.5;
            transform: rotate(2deg) scale(0.98);
        }

        .card .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            gap: 8px;
        }

        .priority-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
            color: #fff;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .priority-badge.priority-high {
            background: #ff3b30;
        }
        .priority-badge.priority-medium {
            background: #ff9500;
        }
        .priority-badge.priority-low {
            background: #34c759;
        }

        .card .card-time {
            font-size: 11px;
            color: #8e8e93;
            white-space: nowrap;
        }

        .card .card-title {
            font-size: 15px;
            font-weight: 600;
            margin: 4px 0 4px;
            word-break: break-word;
        }

        .card .card-note {
            font-size: 13px;
            color: #636366;
            margin: 4px 0 8px;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .card .card-note:empty {
            display: none;
        }

        .card .card-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }

        .card .card-actions .btn-move {
            font-size: 13px;
            padding: 2px 10px;
            border-radius: 6px;
            background: #f0f2f5;
            border: 1px solid #d1d1d6;
            color: #1d1d1f;
            cursor: pointer;
            transition: background 0.2s;
        }

        .card .card-actions .btn-move:hover {
            background: #e0e0e5;
        }

        .card .card-actions .btn-move:focus-visible {
            outline: 2px solid #007aff;
            outline-offset: 2px;
        }

        .card .card-actions .spacer {
            flex: 1;
        }

        /* ========== 空状态提示 ========== */
        .empty-tip {
            text-align: center;
            color: #aeaeb2;
            font-size: 13px;
            padding: 30px 10px;
            user-select: none;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            max-width: 480px;
            width: 100%;
            padding: 28px 24px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1d1d1f;
        }

        .modal .form-group {
            margin-bottom: 16px;
        }

        .modal .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #3a3a3c;
        }

        .modal .form-group input,
        .modal .form-group textarea,
        .modal .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .modal .form-group input:focus,
        .modal .form-group textarea:focus,
        .modal .form-group select:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .modal .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .modal .form-group .required::after {
            content: " *";
            color: #ff3b30;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .modal .modal-actions .btn {
            min-width: 80px;
        }

        /* ========== 响应式布局 ========== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .app-header {
                flex-direction: column;
                align-items: stretch;
                padding: 16px;
            }

            .app-header h1 {
                font-size: 18px;
                text-align: center;
            }

            .app-header h1 small {
                display: block;
                margin-left: 0;
                margin-top: 2px;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar input[type="text"] {
                width: 100%;
            }

            .board {
                flex-direction: column;
                gap: 16px;
            }

            .column {
                padding: 12px;
            }

            .modal {
                padding: 20px 16px 16px;
                margin: 10px;
            }

            .card .card-actions {
                gap: 6px;
            }

            .card .card-actions .btn-move {
                font-size: 12px;
                padding: 2px 8px;
            }
        }

        @media (max-width: 480px) {
            .app-header h1 {
                font-size: 16px;
            }

            .card {
                padding: 12px;
            }

            .card .card-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app">

        <!-- ===== 头部 ===== -->
        <header class="app-header">
            <h1>📋 轻量看板 <small>个人任务管理</small></h1>
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="🔍 搜索任务..." aria-label="搜索任务关键词">
                <select id="filterPriority" aria-label="按优先级筛选">
                    <option value="all">全部优先级</option>
                    <option value="low">低优先级</option>
                    <option value="medium">中优先级</option>
                    <option value="high">高优先级</option>
                </select>
                <button class="btn btn-primary" id="addTaskBtn">＋ 添加任务</button>
            </div>
        </header>

        <!-- ===== 看板三列 ===== -->
        <div class="board">

            <!-- 待办 -->
            <div class="column column-todo" data-status="todo">
                <div class="column-header">
                    <span>📝 待办</span>
                    <span class="count" id="countTodo">0</span>
                </div>
                <div class="card-list" id="listTodo" data-status="todo"></div>
            </div>

            <!-- 进行中 -->
            <div class="column column-doing" data-status="doing">
                <div class="column-header">
                    <span>⚡ 进行中</span>
                    <span class="count" id="countDoing">0</span>
                </div>
                <div class="card-list" id="listDoing" data-status="doing"></div>
            </div>

            <!-- 已完成 -->
            <div class="column column-done" data-status="done">
                <div class="column-header">
                    <span>✅ 已完成</span>
                    <span class="count" id="countDone">0</span>
                </div>
                <div class="card-list" id="listDone" data-status="done"></div>
            </div>

        </div>
    </div>

    <!-- ===== 模态框（添加/编辑） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" role="dialog" aria-labelledby="modalTitle">
            <h2 id="modalTitle">添加任务</h2>
            <form id="taskForm" novalidate>
                <div class="form-group">
                    <label for="taskTitle" class="required">标题</label>
                    <input type="text" id="taskTitle" placeholder="请输入任务标题" required maxlength="200">
                </div>
                <div class="form-group">
                    <label for="taskNote">备注</label>
                    <textarea id="taskNote" placeholder="可选备注" maxlength="1000"></textarea>
                </div>
                <div class="form-group">
                    <label for="taskPriority">优先级</label>
                    <select id="taskPriority">
                        <option value="low">低</option>
                        <option value="medium" selected>中</option>
                        <option value="high">高</option>
                    </select>
                </div>
                <div class="form-group" id="statusFieldGroup" style="display:none;">
                    <label for="taskStatus">状态</label>
                    <select id="taskStatus">
                        <option value="todo">待办</option>
                        <option value="doing">进行中</option>
                        <option value="done">已完成</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="modalCancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary" id="modalConfirmBtn">确认</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /*
         * ================================================================
         *  轻量看板 - JavaScript
         *  功能：数据管理、渲染、拖拽、搜索筛选、模态框、持久化
         * ================================================================
         */

        // ========== 数据层 ==========

        /** 存储键名 */
        const STORAGE_KEY = 'kanban_tasks';

        /** 获取所有任务 */
        function getTasks() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        /** 保存任务列表 */
        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        /** 生成短唯一ID */
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        }

        /** 格式化时间 */
        function formatTime(ts) {
            const d = new Date(ts);
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        // ========== 状态 ==========

        /** 当前编辑中的任务ID（编辑模式用） */
        let editingTaskId = null;

        /** 当前搜索关键词 */
        let searchKeyword = '';

        /** 当前筛选优先级 */
        let filterPriority = 'all';

        // ========== 渲染层 ==========

        /** 获取当前筛选后的任务列表 */
        function getFilteredTasks() {
            const tasks = getTasks();
            const keyword = searchKeyword.trim().toLowerCase();
            const priority = filterPriority;

            return tasks.filter(t => {
                // 搜索匹配
                if (keyword) {
                    const inTitle = t.title.toLowerCase().includes(keyword);
                    const inNote = (t.note || '').toLowerCase().includes(keyword);
                    if (!inTitle && !inNote) return false;
                }
                // 优先级筛选
                if (priority !== 'all' && t.priority !== priority) return false;
                return true;
            });
        }

        /** 渲染整个看板 */
        function renderBoard() {
            const filtered = getFilteredTasks();
            const all = getTasks();

            // 按 status 分组
            const todoTasks = filtered.filter(t => t.status === 'todo');
            const doingTasks = filtered.filter(t => t.status === 'doing');
            const doneTasks = filtered.filter(t => t.status === 'done');

            // 更新各列
            renderColumn('listTodo', todoTasks);
            renderColumn('listDoing', doingTasks);
            renderColumn('listDone', doneTasks);

            // 更新计数（基于全量数据，而非筛选后）
            const totalTodo = all.filter(t => t.status === 'todo').length;
            const totalDoing = all.filter(t => t.status === 'doing').length;
            const totalDone = all.filter(t => t.status === 'done').length;
            document.getElementById('countTodo').textContent = totalTodo;
            document.getElementById('countDoing').textContent = totalDoing;
            document.getElementById('countDone').textContent = totalDone;

            // 重新绑定拖拽事件（在渲染后由拖拽模块处理）
            bindDragEvents();
        }

        /** 渲染单列卡片列表 */
        function renderColumn(listId, tasks) {
            const container = document.getElementById(listId);
            if (!tasks.length) {
                container.innerHTML = `<div class="empty-tip">✨ 暂无任务</div>`;
                return;
            }

            let html = '';
            for (const t of tasks) {
                html += buildCardHTML(t);
            }
            container.innerHTML = html;
        }

        /** 构建单张卡片的HTML */
        function buildCardHTML(task) {
            const priorityLabel = { low: '低', medium: '中', high: '高' };
            const timeStr = formatTime(task.createdAt);

            // 根据状态决定移动按钮
            let leftBtn = '';
            let rightBtn = '';
            if (task.status === 'todo') {
                rightBtn = `<button class="btn-move" data-id="${task.id}" data-dir="right" aria-label="移至进行中">→ 进行中</button>`;
            } else if (task.status === 'doing') {
                leftBtn = `<button class="btn-move" data-id="${task.id}" data-dir="left" aria-label="移至待办">← 待办</button>`;
                rightBtn = `<button class="btn-move" data-id="${task.id}" data-dir="right" aria-label="移至已完成">→ 已完成</button>`;
            } else if (task.status === 'done') {
                leftBtn = `<button class="btn-move" data-id="${task.id}" data-dir="left" aria-label="移至进行中">← 进行中</button>`;
            }

            const noteHtml = task.note ? `<div class="card-note">${escapeHtml(task.note)}</div>` : '';

            return `
                <div class="card" draggable="true" data-id="${task.id}" data-status="${task.status}" data-priority="${task.priority}">
                    <div class="card-top">
                        <span class="priority-badge priority-${task.priority}">${priorityLabel[task.priority]}</span>
                        <span class="card-time">🕐 ${timeStr}</span>
                    </div>
                    <div class="card-title">${escapeHtml(task.title)}</div>
                    ${noteHtml}
                    <div class="card-actions">
                        ${leftBtn}
                        <button class="btn-icon" data-id="${task.id}" data-action="edit" aria-label="编辑任务" title="编辑">✏️</button>
                        <button class="btn-icon" data-id="${task.id}" data-action="delete" aria-label="删除任务" title="删除">🗑️</button>
                        <span class="spacer"></span>
                        ${rightBtn}
                    </div>
                </div>
            `;
        }

        /** 简单的HTML转义 */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 拖拽模块 ==========

        let dragSourceId = null;

        /** 绑定拖拽事件到所有卡片和列 */
        function bindDragEvents() {
            // 先清除所有旧监听（避免重复绑定），使用捕获阶段进行处理
            // 我们采用事件委托方式，降低复杂度
            const lists = ['listTodo', 'listDoing', 'listDone'];
            for (const id of lists) {
                const el = document.getElementById(id);
                // 移除旧监听 (通过替换克隆节点的方式太暴力，使用标志量控制)
                if (!el._dragBound) {
                    el.addEventListener('dragover', handleDragOver);
                    el.addEventListener('dragenter', handleDragEnter);
                    el.addEventListener('dragleave', handleDragLeave);
                    el.addEventListener('drop', handleDrop);
                    el._dragBound = true;
                }
            }

            // 卡片事件委托 (在document层面处理)
            document.querySelectorAll('.card[draggable="true"]').forEach(card => {
                card.removeEventListener('dragstart', handleDragStart);
                card.removeEventListener('dragend', handleDragEnd);
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
            });
        }

        /** 拖拽开始 */
        function handleDragStart(e) {
            const card = e.target.closest('.card');
            if (!card) return;
            dragSourceId = card.dataset.id;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', card.dataset.id);
            // 设置拖拽图标
            const ghost = card.cloneNode(true);
            ghost.style.position = 'absolute';
            ghost.style.top = '-1000px';
            ghost.style.opacity = '0.6';
            document.body.appendChild(ghost);
            e.dataTransfer.setDragImage(ghost, 80, 40);
            setTimeout(() => document.body.removeChild(ghost), 0);
        }

        /** 拖拽结束 */
        function handleDragEnd(e) {
            const card = e.target.closest('.card');
            if (card) card.classList.remove('dragging');
            // 移除所有列的 drag-over 样式
            document.querySelectorAll('.card-list').forEach(el => el.classList.remove('drag-over'));
            dragSourceId = null;
        }

        /** 拖拽经过列 */
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        /** 拖拽进入列 */
        function handleDragEnter(e) {
            e.preventDefault();
            const list = e.target.closest('.card-list');
            if (list) list.classList.add('drag-over');
        }

        /** 拖拽离开列 */
        function handleDragLeave(e) {
            const list = e.target.closest('.card-list');
            if (list) {
                // 只有真正离开列时才移除
                const related = e.relatedTarget;
                if (!related || !list.contains(related)) {
                    list.classList.remove('drag-over');
                }
            }
        }

        /** 放置到列 */
        function handleDrop(e) {
            e.preventDefault();
            const list = e.target.closest('.card-list');
            if (!list) return;
            list.classList.remove('drag-over');

            const targetStatus = list.dataset.status;
            const taskId = e.dataTransfer.getData('text/plain');
            if (!taskId) return;

            // 如果来源ID相同或无效，忽略
            if (!taskId) return;

            const tasks = getTasks();
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            if (task.status === targetStatus) return; // 同一列不处理

            // 更新状态
            task.status = targetStatus;
            task.updatedAt = Date.now();
            saveTasks(tasks);
            renderBoard();
        }

        // ========== 移动按钮处理（无障碍） ==========

        /** 处理卡片的左移/右移 */
        function handleMoveTask(taskId, direction) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const statusOrder = ['todo', 'doing', 'done'];
            const idx = statusOrder.indexOf(task.status);
            if (idx === -1) return;

            let newIdx = direction === 'right' ? idx + 1 : idx - 1;
            if (newIdx < 0 || newIdx > 2) return;

            const newStatus = statusOrder[newIdx];
            task.status = newStatus;
            task.updatedAt = Date.now();
            saveTasks(tasks);
            renderBoard();
        }

        // ========== 删除任务 ==========

        function deleteTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            let tasks = getTasks();
            tasks = tasks.filter(t => t.id !== taskId);
            saveTasks(tasks);
            renderBoard();
        }

        // ========== 模态框操作 ==========

        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const taskForm = document.getElementById('taskForm');
        const taskTitle = document.getElementById('taskTitle');
        const taskNote = document.getElementById('taskNote');
        const taskPriority = document.getElementById('taskPriority');
        const taskStatus = document.getElementById('taskStatus');
        const statusFieldGroup = document.getElementById('statusFieldGroup');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');

        /** 打开模态框（添加模式） */
        function openAddModal() {
            editingTaskId = null;
            modalTitle.textContent = '添加任务';
            taskForm.reset();
            taskPriority.value = 'medium';
            statusFieldGroup.style.display = 'none';
            taskStatus.value = 'todo';
            // 清除错误样式
            taskTitle.style.borderColor = '';
            modalOverlay.classList.add('active');
            setTimeout(() => taskTitle.focus(), 100);
        }

        /** 打开模态框（编辑模式） */
        function openEditModal(taskId) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            editingTaskId = taskId;
            modalTitle.textContent = '编辑任务';
            taskTitle.value = task.title;
            taskNote.value = task.note || '';
            taskPriority.value = task.priority;
            statusFieldGroup.style.display = 'block';
            taskStatus.value = task.status;
            taskTitle.style.borderColor = '';
            modalOverlay.classList.add('active');
            setTimeout(() => taskTitle.focus(), 100);
        }

        /** 关闭模态框 */
        function closeModal() {
            modalOverlay.classList.remove('active');
            editingTaskId = null;
            taskForm.reset();
            taskTitle.style.borderColor = '';
        }

        /** 表单提交（添加/编辑保存） */
        function handleFormSubmit(e) {
            e.preventDefault();

            // 标题必填校验
            const title = taskTitle.value.trim();
            if (!title) {
                taskTitle.style.borderColor = '#ff3b30';
                taskTitle.focus();
                return;
            }
            taskTitle.style.borderColor = '';

            const note = taskNote.value.trim();
            const priority = taskPriority.value;

            const tasks = getTasks();

            if (editingTaskId) {
                // 编辑模式
                const task = tasks.find(t => t.id === editingTaskId);
                if (!task) return;
                task.title = title;
                task.note = note;
                task.priority = priority;
                task.status = taskStatus.value;
                task.updatedAt = Date.now();
            } else {
                // 添加模式
                const newTask = {
                    id: generateId(),
                    title: title,
                    note: note,
                    priority: priority,
                    status: 'todo', // 默认放入待办
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                tasks.push(newTask);
            }

            saveTasks(tasks);
            closeModal();
            renderBoard();
        }

        // ========== 搜索与筛选 ==========

        function handleSearchInput(e) {
            searchKeyword = e.target.value;
            renderBoard();
        }

        function handleFilterChange(e) {
            filterPriority = e.target.value;
            renderBoard();
        }

        // ========== 全局事件委托 ==========

        document.addEventListener('click', function(e) {
            const target = e.target;

            // 卡片移动按钮
            if (target.classList.contains('btn-move')) {
                const id = target.dataset.id;
                const dir = target.dataset.dir;
                if (id && dir) {
                    handleMoveTask(id, dir);
                    return;
                }
            }

            // 编辑按钮
            if (target.dataset && target.dataset.action === 'edit') {
                const id = target.dataset.id;
                if (id) {
                    openEditModal(id);
                    return;
                }
            }

            // 删除按钮
            if (target.dataset && target.dataset.action === 'delete') {
                const id = target.dataset.id;
                if (id) {
                    deleteTask(id);
                    return;
                }
            }

            // 添加任务按钮
            if (target.id === 'addTaskBtn') {
                openAddModal();
                return;
            }

            // 模态框取消
            if (target.id === 'modalCancelBtn' || target === modalOverlay) {
                closeModal();
                return;
            }
        });

        // ========== 表单提交 ==========

        taskForm.addEventListener('submit', handleFormSubmit);

        // ========== 搜索/筛选输入 ==========

        document.getElementById('searchInput').addEventListener('input', handleSearchInput);
        document.getElementById('filterPriority').addEventListener('change', handleFilterChange);

        // ========== 键盘支持：模态框 ESC 关闭 ==========

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });

        // ========== 初始化 ==========

        (function init() {
            // 如果没有数据，插入一些示例任务以便演示
            const tasks = getTasks();
            if (tasks.length === 0) {
                const now = Date.now();
                const sampleTasks = [{
                    id: generateId(),
                    title: '设计首页原型',
                    note: '使用Figma完成低保真原型',
                    priority: 'high',
                    status: 'todo',
                    createdAt: now - 86400000 * 2,
                    updatedAt: now - 86400000 * 2
                }, {
                    id: generateId(),
                    title: '编写API文档',
                    note: '重点描述用户认证模块',
                    priority: 'medium',
                    status: 'doing',
                    createdAt: now - 86400000 * 3,
                    updatedAt: now - 86400000 * 1
                }, {
                    id: generateId(),
                    title: '配置CI/CD流水线',
                    note: '使用GitHub Actions',
                    priority: 'medium',
                    status: 'done',
                    createdAt: now - 86400000 * 5,
                    updatedAt: now - 86400000 * 2
                }, {
                    id: generateId(),
                    title: '修复登录页样式BUG',
                    note: '',
                    priority: 'low',
                    status: 'todo',
                    createdAt: now - 86400000 * 1,
                    updatedAt: now - 86400000 * 1
                }];
                saveTasks(sampleTasks);
            }

            // 首次渲染
            renderBoard();

            // 聚焦搜索框快捷键 (Ctrl+K)
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        })();

        // 暴露一些变量到控制台便于调试（非必须）
        console.log('📋 轻量看板已启动！');
        console.log('💡 快捷键: Ctrl+K 聚焦搜索');
    </script>
</body>
</html>
