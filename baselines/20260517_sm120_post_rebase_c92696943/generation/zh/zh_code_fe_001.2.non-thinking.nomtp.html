<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>轻量看板 · 任务管理</title>
    <style>
        /* 全局重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f4f5f7;
            min-height: 100vh;
            padding: 1.5rem 1rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 主容器 */
        .kanban-app {
            max-width: 1300px;
            width: 100%;
        }

        /* 页眉 + 操作栏 */
        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem 0.8rem;
            margin-bottom: 2rem;
        }

        .app-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.02em;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 0.8rem;
            background: white;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .toolbar input, .toolbar select, .toolbar button {
            font-size: 0.95rem;
            padding: 0.4rem 0.9rem;
            border: 1px solid #d0d5dd;
            border-radius: 30px;
            background: white;
            transition: 0.2s;
            outline: none;
        }

        .toolbar input:focus, .toolbar select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .toolbar button {
            background: #3b82f6;
            color: white;
            border: none;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(59,130,246,0.3);
        }

        .toolbar button:hover {
            background: #2563eb;
            transform: scale(1.02);
        }

        .toolbar .clear-btn {
            background: transparent;
            color: #475569;
            border: 1px solid #cbd5e1;
            box-shadow: none;
        }

        .clear-btn:hover {
            background: #e2e8f0;
        }

        /* 三列看板 (grid) */
        .board-columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        /* 每一列 */
        .column {
            background: #eef0f4;
            border-radius: 24px;
            padding: 1.2rem 0.8rem 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            transition: background 0.1s;
            display: flex;
            flex-direction: column;
            min-height: 260px;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.4rem 0.8rem 0.4rem;
            font-weight: 600;
            color: #0f172a;
            border-bottom: 2px solid #d1d9e6;
        }

        .column-header h2 {
            font-size: 1.25rem;
            letter-spacing: -0.01em;
        }

        .column-header span {
            background: #cbd5e1;
            padding: 0.1rem 0.75rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
        }

        /* 卡片容器 (拖拽放置) */
        .card-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            padding: 0.6rem 0.1rem 0.2rem;
            min-height: 100px;
            transition: background 0.1s;
            border-radius: 16px;
        }

        .card-list.drag-over {
            background: rgba(59, 130, 246, 0.08);
            outline: 2px dashed #3b82f6;
            outline-offset: -2px;
        }

        /* 任务卡片 */
        .task-card {
            background: white;
            border-radius: 20px;
            padding: 0.9rem 1rem 0.8rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0,0,0,0.01);
            transition: 0.15s;
            cursor: grab;
            word-wrap: break-word;
            border-left: 5px solid #94a3b8;
            position: relative;
        }

        .task-card:active {
            cursor: grabbing;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
        }

        .task-card.dragging {
            opacity: 0.4;
            transform: rotate(1deg);
        }

        .task-card.priority-high {
            border-left-color: #ef4444;
        }
        .task-card.priority-medium {
            border-left-color: #f59e0b;
        }
        .task-card.priority-low {
            border-left-color: #22c55e;
        }

        .task-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: #0b1e33;
            margin-bottom: 0.2rem;
            word-break: break-word;
        }

        .task-note {
            color: #475569;
            font-size: 0.9rem;
            line-height: 1.3;
            margin: 0.25rem 0 0.5rem;
            white-space: pre-wrap;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.3rem;
            border-top: 1px solid #f1f5f9;
            padding-top: 0.4rem;
        }

        .task-meta .priority-badge {
            font-weight: 500;
            background: #f1f5f9;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }

        .task-actions button {
            background: transparent;
            border: none;
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 40px;
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
        }

        .task-actions button:hover {
            background: #e2e8f0;
            border-color: #94a3b8;
        }

        .task-actions .move-btn {
            background: #dbeafe;
        }

        .task-actions .move-btn:hover {
            background: #bfdbfe;
        }

        .task-actions .delete-btn {
            background: #fee2e2;
            color: #991b1b;
        }

        .task-actions .delete-btn:hover {
            background: #fecaca;
        }

        /* 新增/编辑 简易内联表单 (modal 风格) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            max-width: 420px;
            width: 90%;
            border-radius: 40px;
            padding: 1.8rem 1.8rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .modal-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
        }

        .modal-card label {
            font-weight: 500;
            color: #1e293b;
            margin-top: 0.2rem;
        }

        .modal-card input, .modal-card textarea, .modal-card select {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 0.95rem;
            background: white;
            transition: 0.15s;
        }

        .modal-card textarea {
            min-height: 70px;
            resize: vertical;
            border-radius: 20px;
        }

        .modal-card input:focus, .modal-card textarea:focus, .modal-card select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 0.25rem;
        }

        .modal-actions button {
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            font-size: 1rem;
            background: #e2e8f0;
            cursor: pointer;
        }

        .modal-actions .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .modal-actions .btn-primary:hover {
            background: #2563eb;
        }

        .hidden {
            display: none !important;
        }

        /* 响应式：窄屏下三列纵向 */
        @media (max-width: 700px) {
            .board-columns {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar {
                justify-content: center;
                border-radius: 30px;
                padding: 0.7rem 1rem;
                flex-wrap: wrap;
            }
            .modal-card {
                padding: 1.5rem;
            }
        }

        /* 辅助类 */
        .text-muted {
            color: #64748b;
        }

        .gap-small {
            gap: 0.3rem;
        }
    </style>
</head>
<body>
<div class="kanban-app" id="app">
    <!-- 头部 + 工具栏 -->
    <div class="app-header">
        <h1>📋 轻量看板</h1>
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="🔍 搜索标题/备注" aria-label="搜索任务">
            <select id="priorityFilter" aria-label="筛选优先级">
                <option value="all">全部优先级</option>
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
            </select>
            <button id="addTaskBtn" aria-label="新增任务">➕ 新增任务</button>
            <button class="clear-btn" id="clearFilterBtn" aria-label="清除筛选">✕ 清除</button>
        </div>
    </div>

    <!-- 三列看板 -->
    <div class="board-columns">
        <div class="column" data-column="todo">
            <div class="column-header"><h2>📝 待办</h2><span id="todoCount">0</span></div>
            <div class="card-list" id="todoList" data-column="todo"></div>
        </div>
        <div class="column" data-column="inprogress">
            <div class="column-header"><h2>⚙️ 进行中</h2><span id="inprogressCount">0</span></div>
            <div class="card-list" id="inprogressList" data-column="inprogress"></div>
        </div>
        <div class="column" data-column="done">
            <div class="column-header"><h2>✅ 已完成</h2><span id="doneCount">0</span></div>
            <div class="card-list" id="doneList" data-column="done"></div>
        </div>
    </div>
</div>

<!-- 新增/编辑 Modal (默认隐藏) -->
<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-card">
        <h3 id="modalTitle">📌 新增任务</h3>
        <label for="taskTitleInput">标题 *</label>
        <input type="text" id="taskTitleInput" placeholder="必填，例如：设计首页" required>
        <label for="taskNoteInput">备注</label>
        <textarea id="taskNoteInput" placeholder="选填，详细描述..." rows="2"></textarea>
        <label for="taskPriorityInput">优先级</label>
        <select id="taskPriorityInput">
            <option value="low">低</option>
            <option value="medium" selected>中</option>
            <option value="high">高</option>
        </select>
        <div class="modal-actions">
            <button id="modalCancelBtn">取消</button>
            <button id="modalConfirmBtn" class="btn-primary">保存</button>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ---------- 状态 ----------
        let tasks = [];                 // { id, title, note, priority, column, createdAt }
        let currentEditId = null;      // 编辑模式时使用
        let searchKeyword = '';
        let filterPriority = 'all';

        // DOM 元素
        const todoList = document.getElementById('todoList');
        const inprogressList = document.getElementById('inprogressList');
        const doneList = document.getElementById('doneList');
        const todoCount = document.getElementById('todoCount');
        const inprogressCount = document.getElementById('inprogressCount');
        const doneCount = document.getElementById('doneCount');

        const addBtn = document.getElementById('addTaskBtn');
        const searchInput = document.getElementById('searchInput');
        const filterSelect = document.getElementById('priorityFilter');
        const clearFilterBtn = document.getElementById('clearFilterBtn');

        const modal = document.getElementById('taskModal');
        const modalTitle = document.getElementById('modalTitle');
        const taskTitleInput = document.getElementById('taskTitleInput');
        const taskNoteInput = document.getElementById('taskNoteInput');
        const taskPriorityInput = document.getElementById('taskPriorityInput');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');

        // ---------- 数据持久化 ----------
        function loadTasks() {
            try {
                const stored = localStorage.getItem('kanban_tasks');
                if (stored) {
                    tasks = JSON.parse(stored);
                    // 兼容旧数据: 确保每个任务有 createdAt
                    tasks = tasks.map(t => {
                        if (!t.createdAt) t.createdAt = Date.now();
                        return t;
                    });
                } else {
                    // 示例默认数据
                    tasks = [
                        { id: '1', title: '梳理需求文档', note: '与产品对齐', priority: 'high', column: 'todo', createdAt: Date.now() - 3600000 },
                        { id: '2', title: '组件库设计', note: '至少完成 button/input', priority: 'medium', column: 'inprogress', createdAt: Date.now() - 7200000 },
                        { id: '3', title: '调研竞品', note: '参考 Notion 看板', priority: 'low', column: 'done', createdAt: Date.now() - 86400000 },
                    ];
                }
            } catch (e) {
                tasks = [];
            }
        }

        function saveTasks() {
            localStorage.setItem('kanban_tasks', JSON.stringify(tasks));
        }

        // ---------- 渲染 ----------
        function renderBoard() {
            // 过滤 & 搜索
            const filtered = tasks.filter(task => {
                if (filterPriority !== 'all' && task.priority !== filterPriority) return false;
                if (searchKeyword.trim() !== '') {
                    const kw = searchKeyword.trim().toLowerCase();
                    const matchTitle = task.title.toLowerCase().includes(kw);
                    const matchNote = (task.note || '').toLowerCase().includes(kw);
                    if (!matchTitle && !matchNote) return false;
                }
                return true;
            });

            // 清空列
            todoList.innerHTML = '';
            inprogressList.innerHTML = '';
            doneList.innerHTML = '';

            const todoTasks = filtered.filter(t => t.column === 'todo');
            const inprogressTasks = filtered.filter(t => t.column === 'inprogress');
            const doneTasks = filtered.filter(t => t.column === 'done');

            // 渲染卡片到对应列
            todoTasks.forEach(task => renderCard(task, todoList));
            inprogressTasks.forEach(task => renderCard(task, inprogressList));
            doneTasks.forEach(task => renderCard(task, doneList));

            // 更新计数
            todoCount.textContent = tasks.filter(t => t.column === 'todo').length;
            inprogressCount.textContent = tasks.filter(t => t.column === 'inprogress').length;
            doneCount.textContent = tasks.filter(t => t.column === 'done').length;

            // 重新挂载拖拽事件 (因为卡片被重建)
            attachDragListeners();
        }

        // 渲染单张卡片
        function renderCard(task, container) {
            const card = document.createElement('div');
            card.className = `task-card priority-${task.priority}`;
            card.draggable = true;
            card.dataset.taskId = task.id;
            card.dataset.column = task.column;

            // 时间格式化
            const date = new Date(task.createdAt);
            const timeStr = `${date.getMonth()+1}月${date.getDate()}日 ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;

            card.innerHTML = `
                <div class="task-title">${escapeHtml(task.title)}</div>
                ${task.note ? `<div class="task-note">${escapeHtml(task.note)}</div>` : ''}
                <div class="task-meta">
                    <span>🕒 ${timeStr}</span>
                    <span class="priority-badge">${priorityLabel(task.priority)}</span>
                </div>
                <div class="task-actions">
                    <button class="move-btn" data-direction="left" data-id="${task.id}" aria-label="左移">◀ 左移</button>
                    <button class="move-btn" data-direction="right" data-id="${task.id}" aria-label="右移">右移 ▶</button>
                    <button data-action="edit" data-id="${task.id}" aria-label="编辑">✎ 编辑</button>
                    <button class="delete-btn" data-action="delete" data-id="${task.id}" aria-label="删除">✕ 删除</button>
                </div>
            `;
            container.appendChild(card);
        }

        // 辅助
        function priorityLabel(p) {
            return { low: '🟢 低', medium: '🟡 中', high: '🔴 高' }[p] || p;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---------- 拖拽 (原生 HTML5) ----------
        function attachDragListeners() {
            const cards = document.querySelectorAll('.task-card');
            const lists = [todoList, inprogressList, doneList];

            cards.forEach(c => {
                c.removeEventListener('dragstart', dragStartHandler);
                c.removeEventListener('dragend', dragEndHandler);
                c.addEventListener('dragstart', dragStartHandler);
                c.addEventListener('dragend', dragEndHandler);
            });

            lists.forEach(list => {
                list.removeEventListener('dragover', dragOverHandler);
                list.removeEventListener('drop', dropHandler);
                list.removeEventListener('dragenter', dragEnterHandler);
                list.removeEventListener('dragleave', dragLeaveHandler);
                list.addEventListener('dragover', dragOverHandler);
                list.addEventListener('drop', dropHandler);
                list.addEventListener('dragenter', dragEnterHandler);
                list.addEventListener('dragleave', dragLeaveHandler);
            });
        }

        let draggedId = null;

        function dragStartHandler(e) {
            const card = e.target.closest('.task-card');
            if (!card) return;
            draggedId = card.dataset.taskId;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedId);
        }

        function dragEndHandler(e) {
            const card = e.target.closest('.task-card');
            if (card) card.classList.remove('dragging');
            // 移除所有高亮
            document.querySelectorAll('.card-list').forEach(el => el.classList.remove('drag-over'));
        }

        function dragOverHandler(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function dragEnterHandler(e) {
            const list = e.target.closest('.card-list');
            if (list) list.classList.add('drag-over');
        }

        function dragLeaveHandler(e) {
            const list = e.target.closest('.card-list');
            if (list) list.classList.remove('drag-over');
        }

        function dropHandler(e) {
            e.preventDefault();
            const list = e.target.closest('.card-list');
            if (!list) return;
            list.classList.remove('drag-over');

            const targetColumn = list.dataset.column;
            if (!draggedId || !targetColumn) return;

            // 检查任务是否存在
            const taskIndex = tasks.findIndex(t => t.id === draggedId);
            if (taskIndex === -1) return;
            const task = tasks[taskIndex];
            if (task.column === targetColumn) return; // 未移动

            // 更新数据
            task.column = targetColumn;
            saveTasks();
            renderBoard();
            draggedId = null;
        }

        // ---------- 按钮移动 (无障碍) ----------
        function handleMove(taskId, direction) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            const columns = ['todo', 'inprogress', 'done'];
            const idx = columns.indexOf(task.column);
            if (direction === 'left' && idx > 0) {
                task.column = columns[idx - 1];
            } else if (direction === 'right' && idx < columns.length - 1) {
                task.column = columns[idx + 1];
            } else {
                return;
            }
            saveTasks();
            renderBoard();
        }

        // ---------- 增删改 ----------
        function openModal(editId = null) {
            currentEditId = editId;
            modal.classList.remove('hidden');
            if (editId) {
                const task = tasks.find(t => t.id === editId);
                if (!task) return;
                modalTitle.textContent = '✎ 编辑任务';
                taskTitleInput.value = task.title;
                taskNoteInput.value = task.note || '';
                taskPriorityInput.value = task.priority;
            } else {
                modalTitle.textContent = '📌 新增任务';
                taskTitleInput.value = '';
                taskNoteInput.value = '';
                taskPriorityInput.value = 'medium';
            }
            taskTitleInput.focus();
        }

        function closeModal() {
            modal.classList.add('hidden');
            currentEditId = null;
        }

        function handleModalConfirm() {
            const title = taskTitleInput.value.trim();
            if (!title) {
                alert('标题不能为空');
                return;
            }
            const note = taskNoteInput.value.trim();
            const priority = taskPriorityInput.value;

            if (currentEditId) {
                // 编辑
                const task = tasks.find(t => t.id === currentEditId);
                if (task) {
                    task.title = title;
                    task.note = note;
                    task.priority = priority;
                }
            } else {
                // 新增 (默认放入待办)
                const newTask = {
                    id: Date.now() + '-' + Math.random().toString(36).slice(2, 6),
                    title: title,
                    note: note,
                    priority: priority,
                    column: 'todo',
                    createdAt: Date.now(),
                };
                tasks.push(newTask);
            }
            saveTasks();
            renderBoard();
            closeModal();
        }

        function deleteTask(taskId) {
            if (!confirm('确定删除任务吗？')) return;
            tasks = tasks.filter(t => t.id !== taskId);
            saveTasks();
            renderBoard();
        }

        // ---------- 事件委托 (卡片按钮) ----------
        function handleCardActions(e) {
            const target = e.target.closest('button');
            if (!target) return;
            const id = target.dataset.id;
            if (!id) return;

            if (target.dataset.action === 'edit') {
                openModal(id);
            } else if (target.dataset.action === 'delete') {
                deleteTask(id);
            } else if (target.classList.contains('move-btn')) {
                const direction = target.dataset.direction; // 'left' or 'right'
                handleMove(id, direction);
            }
        }

        // ---------- 搜索与筛选 ----------
        function applyFilterAndSearch() {
            searchKeyword = searchInput.value;
            filterPriority = filterSelect.value;
            renderBoard();
        }

        function clearFilters() {
            searchInput.value = '';
            filterSelect.value = 'all';
            searchKeyword = '';
            filterPriority = 'all';
            renderBoard();
        }

        // ---------- 初始化 ----------
        function init() {
            loadTasks();
            renderBoard();

            // 监听器
            addBtn.addEventListener('click', () => openModal(null));
            modalConfirmBtn.addEventListener('click', handleModalConfirm);
            modalCancelBtn.addEventListener('click', closeModal);
            // 点击遮罩关闭（仅点击背景）
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            // 搜索 & 筛选
            searchInput.addEventListener('input', applyFilterAndSearch);
            filterSelect.addEventListener('change', applyFilterAndSearch);
            clearFilterBtn.addEventListener('click', clearFilters);

            // 卡片按钮事件委托 (列容器)
            todoList.addEventListener('click', handleCardActions);
            inprogressList.addEventListener('click', handleCardActions);
            doneList.addEventListener('click', handleCardActions);

            // 窗口关闭前无需额外操作
        }

        init();
    })();
</script>
</body>
</html>
