<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Wall Clock</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Clock dial container */
        .clock {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #ffffff;
            border: 6px solid #1a1a1a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 8px 16px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.06);
        }

        /* 60 scale marks */
        .scale {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 2px;
            transform-origin: center center;
            z-index: 1;
        }

        .scale-hour {
            width: 4px;
            height: 25px;
            background: #222;
        }

        .scale-minute {
            width: 2px;
            height: 15px;
            background: #bbb;
        }

        /* Clock numbers 1 – 12 */
        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 1.1rem;
            font-weight: 500;
            color: #222;
            transform-origin: center center;
            z-index: 5;
            text-align: center;
        }

        /* Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            z-index: 10;
        }

        .hour-hand {
            height: 100px;
            width: 6px;
            background: #1a1a1a;
            margin-left: -3px;
            border-radius: 3px;
        }

        .min-hand {
            height: 140px;
            width: 4px;
            background: #1a1a1a;
            margin-left: -2px;
            border-radius: 2px;
        }

        .second-hand {
            height: 160px;
            width: 2px;
            background: #e74c3c;
            margin-left: -1px;
            border-radius: 1px;
        }

        /* Center pivot dot */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        /* Text information */
        .time-text {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            font-weight: 300;
            color: #222;
            z-index: 30;
            text-align: center;
            letter-spacing: 2px;
        }

        .date-text {
            position: absolute;
            top: 78%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 400;
            color: #666;
            z-index: 30;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="clock-face">
            <!-- Static DOM elements, dynamic parts appended by JavaScript -->
            <div class="hand hour-hand"></div>
            <div class="hand min-hand"></div>
            <div class="hand second-hand"></div>
            <div class="center-dot"></div>
            <div class="time-text"></div>
            <div class="date-text"></div>
        </div>
    </div>

    <script>
        (function() {
            const face = document.querySelector('.clock-face');

            // -------- Generate 60 scale marks ----------
            for (let i = 0; i < 60; i++) {
                const scale = document.createElement('div');
                const angle = i * 6;
                if (i % 5 === 0) {
                    // Hour marks: thicker & darker
                    scale.className = 'scale scale-hour';
                    scale.style.transform =
                        `translate(-50%, -50%) rotate(${angle}deg) translateY(-175px)`;
                } else {
                    // Minute marks: thinner & lighter
                    scale.className = 'scale scale-minute';
                    scale.style.transform =
                        `translate(-50%, -50%) rotate(${angle}deg) translateY(-182px)`;
                }
                face.insertBefore(scale, face.firstChild);
            }

            // -------- Generate numbers 1 – 12 ----------
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div');
                num.className = 'number';
                num.textContent = i;
                const angle = i * 30;
                // Rotate outward, then counter‑rotate the text so it stays upright
                num.style.transform =
                    `translate(-50%, -50%) rotate(${angle}deg) translateY(-145px) rotate(-${angle}deg)`;
                face.insertBefore(num, face.firstChild);
            }

            // -------- Cache DOM references ----------
            const hourHand = document.querySelector('.hour-hand');
            const minHand = document.querySelector('.min-hand');
            const secondHand = document.querySelector('.second-hand');
            const timeText = document.querySelector('.time-text');
            const dateText = document.querySelector('.date-text');

            // -------- Core clock logic ----------
            function updateClock() {
                // Obtain accurate China Standard Time (UTC+8)
                const now = new Date();
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const shanghaiTime = new Date(utc + (3600000 * 8));

                const h = shanghaiTime.getHours();
                const m = shanghaiTime.getMinutes();
                const s = shanghaiTime.getSeconds();
                const ms = shanghaiTime.getMilliseconds();

                // Smooth continuous rotation angles
                const hourDeg = (h % 12) * 30 +
                    m * 0.5 +
                    s * (0.5 / 60) +
                    ms * (0.5 / 60000);

                const minuteDeg = m * 6 +
                    s * 0.1 +
                    ms * 0.0001;

                const secondDeg = s * 6 +
                    ms * 0.006;

                // Apply rotations
                hourHand.style.transform = `rotate(${hourDeg}deg)`;
                minHand.style.transform = `rotate(${minuteDeg}deg)`;
                secondHand.style.transform = `rotate(${secondDeg}deg)`;

                // Update text displays
                const timeString = shanghaiTime.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false, // 24‑hour format
                });
                timeText.textContent = timeString;

                const dateString = shanghaiTime.toLocaleDateString('en-US', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                });
                dateText.textContent = dateString;
            }

            // -------- Start the animation loop ----------
            function tick() {
                updateClock();
                requestAnimationFrame(tick);
            }

            // Initial call to prevent one-frame delay
            updateClock();
            requestAnimationFrame(tick);
        })();
    </script>
</body>
</html>
