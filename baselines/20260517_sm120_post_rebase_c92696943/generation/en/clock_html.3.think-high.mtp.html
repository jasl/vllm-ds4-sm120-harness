<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beijing Time Clock</title>
    <style>
        /* ---- Reset & Base ---- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- Clock Container (3D shadow shell) ---- */
        .clock-container {
            position: relative;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: #f5f5f0;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.45),
                0 8px 20px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.6),
                inset 0 -4px 12px rgba(0, 0, 0, 0.08);
            border: 8px solid #2c2c2c;
            transition: box-shadow 0.2s;
        }

        /* ---- Clock Face (dial) ---- */
        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #fafaf7;
            /* subtle radial texture */
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), transparent 70%);
        }

        /* ---- Scales (tick marks) ---- */
        .scales-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .scale {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: center bottom;
            border-radius: 2px;
            pointer-events: none;
        }

        .scale-minute {
            width: 2px;
            height: 16px;
            margin-left: -1px;
            background: #b0b0b0;
        }

        .scale-hour {
            width: 4px;
            height: 26px;
            margin-left: -2px;
            background: #3a3a3a;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* ---- Numbers ---- */
        .numbers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 36px;
            height: 36px;
            margin-left: -18px;
            margin-top: -18px;
            font-size: 17px;
            font-weight: 600;
            color: #2c2c2c;
            text-align: center;
            line-height: 36px;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        /* ---- Hands ---- */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: center bottom;
            border-radius: 4px;
            z-index: 5;
            pointer-events: none;
            transition: none;
            will-change: transform;
        }

        .hour-hand {
            height: 110px;
            width: 8px;
            margin-left: -4px;
            background: #1f1f1f;
            border-radius: 4px 4px 3px 3px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            z-index: 5;
        }

        .minute-hand {
            height: 155px;
            width: 5px;
            margin-left: -2.5px;
            background: #1f1f1f;
            border-radius: 3px 3px 2px 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 6;
        }

        .second-hand {
            height: 178px;
            width: 2px;
            margin-left: -1px;
            background: #d13a3a;
            border-radius: 1px;
            box-shadow: 0 2px 12px rgba(209, 58, 58, 0.4);
            z-index: 7;
        }

        /* small tail on second hand */
        .second-hand::before {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background: #d13a3a;
            border-radius: 1px;
            opacity: 0.6;
        }

        /* Center dot */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            margin-left: -7px;
            margin-top: -7px;
            border-radius: 50%;
            background: #1f1f1f;
            z-index: 10;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .center-dot::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d13a3a;
            opacity: 0.85;
        }

        /* ---- Text Displays ---- */
        .text-display {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8;
            pointer-events: none;
            text-align: center;
            width: 80%;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 400;
            color: #2c2c2c;
            line-height: 1.4;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }

        .time-text {
            top: 26%;
            font-size: 30px;
            font-weight: 500;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            color: #1a1a1a;
        }

        .date-text {
            bottom: 26%;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 0.8px;
            color: #4a4a4a;
            opacity: 0.9;
        }

        /* ---- Responsive ---- */
        @media (max-width: 480px) {
            .clock-container {
                width: 92vw;
                height: 92vw;
                max-width: 400px;
                max-height: 400px;
                border-width: 6px;
            }
            .time-text {
                font-size: clamp(18px, 6vw, 28px);
                top: 24%;
            }
            .date-text {
                font-size: clamp(12px, 3.5vw, 16px);
                bottom: 24%;
            }
            .number {
                font-size: 14px;
                width: 28px;
                height: 28px;
                margin-left: -14px;
                margin-top: -14px;
                line-height: 28px;
            }
            .scale-minute {
                height: 12px;
                width: 1.5px;
            }
            .scale-hour {
                height: 20px;
                width: 3px;
            }
            .hour-hand {
                height: 90px;
                width: 6px;
                margin-left: -3px;
            }
            .minute-hand {
                height: 125px;
                width: 4px;
                margin-left: -2px;
            }
            .second-hand {
                height: 145px;
                width: 1.5px;
                margin-left: -0.75px;
            }
            .second-hand::before {
                height: 16px;
                bottom: -14px;
                width: 1.5px;
            }
            .center-dot {
                width: 12px;
                height: 12px;
                margin-left: -6px;
                margin-top: -6px;
            }
            .center-dot::after {
                width: 6px;
                height: 6px;
                top: 3px;
                left: 3px;
            }
        }

        @media (max-width: 360px) {
            .clock-container {
                border-width: 4px;
            }
            .time-text {
                font-size: 16px;
                top: 22%;
            }
            .date-text {
                font-size: 11px;
                bottom: 22%;
            }
            .number {
                font-size: 12px;
                width: 24px;
                height: 24px;
                margin-left: -12px;
                margin-top: -12px;
                line-height: 24px;
            }
            .hour-hand {
                height: 72px;
                width: 5px;
            }
            .minute-hand {
                height: 100px;
                width: 3px;
            }
            .second-hand {
                height: 118px;
                width: 1.2px;
            }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="clock-face" id="clockFace">

            <!-- Scales (generated by JS) -->
            <div class="scales-container" id="scalesContainer"></div>

            <!-- Numbers (generated by JS) -->
            <div class="numbers-container" id="numbersContainer"></div>

            <!-- Hands -->
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <div class="hand second-hand" id="secondHand"></div>

            <!-- Center dot -->
            <div class="center-dot"></div>

            <!-- Text displays -->
            <div class="text-display time-text" id="timeText">00:00:00</div>
            <div class="text-display date-text" id="dateText">---- -- --</div>

        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---- Configuration ----
            const CLOCK_RADIUS_RATIO = 0.5; // 50% of container size
            const SCALE_MINUTE_LENGTH_RATIO = 0.08;
            const SCALE_HOUR_LENGTH_RATIO = 0.13;
            const NUMBER_DISTANCE_RATIO = 0.78;

            // ---- DOM refs ----
            const clockFace = document.getElementById('clockFace');
            const scalesContainer = document.getElementById('scalesContainer');
            const numbersContainer = document.getElementById('numbersContainer');
            const hourHand = document.getElementById('hourHand');
            const minuteHand = document.getElementById('minuteHand');
            const secondHand = document.getElementById('secondHand');
            const timeText = document.getElementById('timeText');
            const dateText = document.getElementById('dateText');

            // ---- State ----
            let radius = 0;
            let scaleMinuteLen = 0;
            let scaleHourLen = 0;
            let numberDist = 0;
            let animationId = null;

            // ---- Build scales & numbers (once) ----
            function buildScales() {
                scalesContainer.innerHTML = '';
                const total = 60;
                for (let i = 0; i < total; i++) {
                    const el = document.createElement('div');
                    const isHour = (i % 5 === 0);
                    el.className = 'scale ' + (isHour ? 'scale-hour' : 'scale-minute');
                    const angle = i * 6;
                    // store angle as data attribute for later resizing if needed
                    el.dataset.angle = angle;
                    el.dataset.isHour = isHour ? '1' : '0';
                    scalesContainer.appendChild(el);
                }
                updateScalePositions();
            }

            function updateScalePositions() {
                const items = scalesContainer.children;
                const r = radius;
                const mLen = scaleMinuteLen;
                const hLen = scaleHourLen;
                for (let i = 0; i < items.length; i++) {
                    const el = items[i];
                    const angle = parseFloat(el.dataset.angle);
                    const isHour = el.dataset.isHour === '1';
                    const len = isHour ? hLen : mLen;
                    const dist = r - len;
                    el.style.transform = 'rotate(' + angle + 'deg) translateY(-' + dist + 'px)';
                    // size already set by CSS classes, but ensure height matches len dynamically
                    if (isHour) {
                        el.style.height = hLen + 'px';
                    } else {
                        el.style.height = mLen + 'px';
                    }
                }
            }

            function buildNumbers() {
                numbersContainer.innerHTML = '';
                const r = radius;
                const dist = numberDist;
                for (let i = 1; i <= 12; i++) {
                    const el = document.createElement('div');
                    el.className = 'number';
                    el.textContent = i;
                    const angle = i * 30;
                    // rotate -> translate -> counter-rotate to keep text upright
                    el.style.transform = 'rotate(' + angle + 'deg) translateY(-' + dist + 'px) rotate(-' + angle + 'deg)';
                    numbersContainer.appendChild(el);
                }
            }

            // ---- Recalculate dimensions based on container size ----
            function recalcDimensions() {
                const rect = clockFace.getBoundingClientRect();
                const size = Math.min(rect.width, rect.height);
                radius = size * CLOCK_RADIUS_RATIO;
                scaleMinuteLen = Math.max(10, size * SCALE_MINUTE_LENGTH_RATIO);
                scaleHourLen = Math.max(18, size * SCALE_HOUR_LENGTH_RATIO);
                numberDist = radius * NUMBER_DISTANCE_RATIO;
            }

            // ---- Full layout rebuild ----
            function rebuildLayout() {
                recalcDimensions();
                updateScalePositions();
                // rebuild numbers because distance changed
                numbersContainer.innerHTML = '';
                const r = radius;
                const dist = numberDist;
                for (let i = 1; i <= 12; i++) {
                    const el = document.createElement('div');
                    el.className = 'number';
                    el.textContent = i;
                    const angle = i * 30;
                    el.style.transform = 'rotate(' + angle + 'deg) translateY(-' + dist + 'px) rotate(-' + angle + 'deg)';
                    numbersContainer.appendChild(el);
                }
            }

            // ---- Beijing Time (UTC+8) ----
            function getBeijingTime() {
                const now = new Date();
                const localOffset = now.getTimezoneOffset(); // minutes, e.g. -480 for UTC+8
                const beijingOffset = -480; // UTC+8 = -480 minutes from UTC
                const diffMs = (beijingOffset - localOffset) * 60000;
                return new Date(now.getTime() + diffMs);
            }

            // ---- Update clock ----
            function updateClock() {
                const bt = getBeijingTime();

                const h = bt.getHours();
                const m = bt.getMinutes();
                const s = bt.getSeconds();
                const ms = bt.getMilliseconds();

                // Smooth angles
                const secondAngle = (s + ms / 1000) * 6;
                const minuteAngle = (m + s / 60) * 6;
                const hourAngle = ((h % 12) + m / 60) * 30;

                // Apply rotations
                hourHand.style.transform = 'rotate(' + hourAngle + 'deg)';
                minuteHand.style.transform = 'rotate(' + minuteAngle + 'deg)';
                secondHand.style.transform = 'rotate(' + secondAngle + 'deg)';

                // Time text (24-hour format)
                const timeStr = String(h).padStart(2, '0') + ':' +
                    String(m).padStart(2, '0') + ':' +
                    String(s).padStart(2, '0');
                timeText.textContent = timeStr;

                // Date and weekday
                const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const dayName = weekdays[bt.getDay()];
                const year = bt.getFullYear();
                const month = String(bt.getMonth() + 1).padStart(2, '0');
                const day = String(bt.getDate()).padStart(2, '0');
                dateText.textContent = year + '-' + month + '-' + day + '  ' + dayName;
            }

            // ---- Animation loop ----
            function animate() {
                updateClock();
                animationId = requestAnimationFrame(animate);
            }

            // ---- Resize handler ----
            let resizeTimer = null;

            function handleResize() {
                if (resizeTimer) {
                    cancelAnimationFrame(resizeTimer);
                    resizeTimer = null;
                }
                resizeTimer = requestAnimationFrame(function() {
                    rebuildLayout();
                    resizeTimer = null;
                });
            }

            // ---- Init ----
            function init() {
                // Initial dimension calc
                recalcDimensions();
                buildScales();
                buildNumbers();

                // Start animation
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                animate();

                // Resize listener
                window.addEventListener('resize', handleResize);

                // Also observe the container for layout changes (edge case)
                if (window.ResizeObserver) {
                    const ro = new ResizeObserver(function() {
                        handleResize();
                    });
                    ro.observe(clockFace);
                }
            }

            // ---- Start when DOM ready ----
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // ---- Cleanup on page unload (optional) ----
            window.addEventListener('beforeunload', function() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            });

        })();
    </script>

</body>
</html>
